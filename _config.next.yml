# NexT v8 主题配置（从 themes/next/_config.yml v5 迁移）

# 主题方案
scheme: Gemini

# 站点图标
favicon:
  small: /images/favicon-16x16-next.png
  medium: /images/favicon-32x32-next.png
  apple_touch_icon: /images/apple-touch-icon-next.png
  safari_pinned_tab: /images/logo.svg

# 页脚
footer:
  since: 2020
  icon:
    name: fa fa-heartbeat
    animated: true
  powered: false

# 菜单
menu:
  home: / || fa fa-home
  archives: /archives/ || fa fa-archive
  tags: /tags/ || fa fa-tags
  categories: /categories/ || fa fa-th
  about: /about/ || fa fa-user
  commonweal: /404.html || fa fa-heartbeat

# 头像
avatar:
  url: /images/header.png
  rounded: true
  rotated: false

# 侧边栏
sidebar:
  position: left
  display: post
  offset: 12

# RSS
rss: /atom.xml

# 代码高亮
codeblock:
  copy_button:
    enable: true

# 打赏
reward_settings:
  enable: true
  comment: 坚持原创技术分享，您的支持将鼓励我继续创作！
reward:
  wechatpay: /images/wx.png
  alipay: /images/zfb.png

# Valine 评论（LeanCloud）
valine:
  enable: true
  appId: nGS6I8Lhxl6RuW9rWHtlzQgi-gzGzoHsz
  appKey: osxkNrrnKC4USSNpLUJyfsCb
  placeholder: Just go go
  avatar: mp
  guest_info: nick,mail,link
  pageSize: 10
  language: zh-cn

# 本地搜索
local_search:
  enable: true
  trigger: auto
  top_n_per_article: 1
  unescape: false

# 字数统计
symbols_count_time:
  separated_meta: true
  item_text_total: true

# 不蒜子访问统计
busuanzi_count:
  enable: false

# 回到顶部
back2top:
  enable: true
  sidebar: false
  scrollpercent: true
